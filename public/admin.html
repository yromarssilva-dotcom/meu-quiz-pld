<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>PopQuiz - Painel do Apresentador</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-right: 0;" id="admin-body"> <!-- Espaço inicial zero, depois aumenta pro sidebar -->
    <!-- Container de Pop-ups de Entrada -->
    <div id="admin-toast-container" class="admin-toast-container"></div>

    <!-- Barra Lateral de Jogadores -->
    <aside class="admin-sidebar" id="admin-sidebar" style="display: none;">
        <h3>Jogadores (<span id="user-count">0</span>)</h3>
        <div id="user-list"></div>
    </aside>

    <!-- Tela Inicial: QR Code Gigante -->
    <div class="admin-container" id="qr-container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 90vh;">
        <h1 style="font-size: 3.5rem; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Escaneie para Participar!</h1>
        <div id="qrcode" style="padding: 25px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>
        <button class="btn-next" style="margin-top: 50px; background: #2196F3; color: white; font-size: 1.5rem; padding: 20px 50px; border-radius: 50px;" onclick="irParaLobby()">Ir para o Lobby (Mostrar PIN) <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <!-- Tela do Jogo / Lobby -->
    <div class="admin-container" id="question-container" style="display: none;">
        <div class="pin-display" style="margin-bottom: 10px;">
            PIN do Jogo: <span id="sala-pin" style="letter-spacing: 4px;">----</span>
        </div>
        <p id="lobby-text" style="color: #FFD700; font-size: 1.2rem; font-weight: bold; margin-bottom: 30px; text-shadow: 1px 1px 2px #000;">Aguardando os jogadores...</p>

        <div id="timer-display" class="timer-display" style="display: none;">--</div>
        
        <h1 id="pergunta" class="kahoot-question" style="display: none;">Aguardando...</h1>
        <div id="dica-admin" style="color: #FFD700; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; text-shadow: 1px 1px 2px #000;"></div>
        
        <!-- Esconde a grade de alternativas até que o jogo comece -->
        <div class="k-grid" id="opcoes-grid" style="display: none;">
            <div class="k-card k-red" id="card-A">
                <div class="k-icon"><i class="fa-solid fa-play fa-rotate-270"></i></div>
                <span class="k-text" id="texto-A">Opção A</span>
                <span class="k-votes" id="votosA">0</span>
            </div>
            <div class="k-card k-blue" id="card-B">
                <div class="k-icon"><i class="fa-solid fa-square" style="transform: rotate(45deg);"></i></div>
                <span class="k-text" id="texto-B">Opção B</span>
                <span class="k-votes" id="votosB">0</span>
            </div>
            <div class="k-card k-yellow" id="card-C">
                <div class="k-icon"><i class="fa-solid fa-circle"></i></div>
                <span class="k-text" id="texto-C">Opção C</span>
                <span class="k-votes" id="votosC">0</span>
            </div>
            <div class="k-card k-green" id="card-D">
                <div class="k-icon"><i class="fa-solid fa-square"></i></div>
                <span class="k-text" id="texto-D">Opção D</span>
                <span class="k-votes" id="votosD">0</span>
            </div>
        </div>

        <!-- Controles da Sala (Lobby) -->
        <div id="controle-inicio" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.1); display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap;">
            <label style="color: white; font-size: 1.2rem; font-weight: bold; margin-right: 15px;">
                Limite de Participantes: 
                <input type="number" id="limite-participantes" value="60" min="1" max="1000" onchange="atualizarLimite(this.value)" style="width: 80px; padding: 5px; border-radius: 5px; border: none; font-size: 1.2rem; text-align: center; color: #333; outline: none;">
            </label>
            <button class="btn-next" style="margin-top: 0; background: #673AB7; color: white;" onclick="abrirGerenciadorPerguntas()"><i class="fa-solid fa-gear"></i> Gerenciar Perguntas</button>
            <button class="btn-next" style="margin-top: 0; background: #FF9800; color: white;" onclick="iniciarQuiz()"><i class="fa-solid fa-play"></i> Iniciar Quiz</button>
        </div>

        <!-- Controles de Pergunta (Escondidos antes de iniciar) -->
        <div id="controle-jogo" style="display: none; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.1); justify-content: center; flex-wrap: wrap; gap: 10px;">
            <button class="btn-next" style="margin-top: 0; background: #4CAF50; color: white;" onclick="avaliarResposta()"><i class="fa-solid fa-eye"></i> Revelar Resposta</button>
            <button class="btn-next" style="margin-top: 0; background: #2196F3; color: white;" onclick="mudarPergunta()"><i class="fa-solid fa-arrow-right"></i> Próxima Pergunta</button>
            <button class="btn-next" style="margin-top: 0; background: #E53935; color: white;" onclick="encerrarJogo()"><i class="fa-solid fa-flag-checkered"></i> Finalizar Quiz e Pódio</button>
            <button class="btn-next" style="margin-top: 0; background: #9C27B0; color: white;" onclick="reiniciarJogo()"><i class="fa-solid fa-rotate-right"></i> Reiniciar Jogo</button>
        </div>
    </div>

    <!-- Tela de Pódio do Telão -->
    <div class="admin-container" id="podium-container" style="display: none; text-align: center;">
        <h2 style="font-size: 3.5rem; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">🏆 Pódio Final 🏆</h2>
        <div class="podium-places" id="podium-places"></div>
        <button class="btn-next" style="margin-top: 50px; background: #9C27B0; color: white; padding: 15px 40px; font-size: 1.5rem;" onclick="reiniciarJogo()"><i class="fa-solid fa-rotate-right"></i> Jogar Novamente</button>
    </div>

    <!-- Modal de Gerenciamento de Perguntas -->
    <div id="modal-perguntas" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharGerenciador()">&times;</span>
            <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-list-check"></i> Gerenciar Perguntas</h2>
            
            <div id="lista-perguntas" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px;">
                <!-- Perguntas injetadas via JS -->
            </div>

            <div style="background: #f4f4f4; padding: 20px; border-radius: 10px; border: 1px solid #ddd;">
                <h3 style="margin-bottom: 15px; font-size: 1.1rem;">Adicionar Nova Pergunta</h3>
                <input type="text" id="nova-pergunta-texto" class="form-input" placeholder="Ex: Qual é a cor do cavalo branco de Napoleão?">
                <div class="grid-opcoes">
                    <input type="text" id="nova-opcao-a" class="form-input" placeholder="Opção A" style="margin-bottom:0;">
                    <input type="text" id="nova-opcao-b" class="form-input" placeholder="Opção B" style="margin-bottom:0;">
                    <input type="text" id="nova-opcao-c" class="form-input" placeholder="Opção C" style="margin-bottom:0;">
                    <input type="text" id="nova-opcao-d" class="form-input" placeholder="Opção D" style="margin-bottom:0;">
                </div>
                <label style="font-weight: bold; margin-right: 10px;">Opção Correta:</label>
                <select id="nova-correta" class="form-input" style="width: auto; display: inline-block;">
                    <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
                </select>
                <button onclick="adicionarPergunta()" style="background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 10px;"><i class="fa-solid fa-plus"></i> Adicionar à Lista</button>
            </div>
            <button onclick="salvarPerguntasNoServidor()" style="margin-top: 20px; background: #2196F3; color: white; padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"><i class="fa-solid fa-floppy-disk"></i> Salvar no Servidor</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const socket = io();
        
        // Assim que o telão conecta com o servidor, ele exige o PIN atualizado
        socket.on('connect', () => {
            document.getElementById('sala-pin').innerText = "CONECTANDO...";
            document.getElementById('sala-pin').style.color = "#FFD700"; // Fica amarelo enquanto pensa
            socket.emit('pedir-pin');
        });

        // Se o servidor cair ou desligar, avisa na tela
        socket.on('disconnect', () => {
            document.getElementById('sala-pin').innerText = "OFFLINE";
            document.getElementById('sala-pin').style.color = "#FF3333"; // Fica vermelho se perder a conexão
        });

        // Puxa o número do PIN gerado pelo backend
        socket.on('estado-sala', (dados) => {
            if (dados && dados.pin) {
                document.getElementById('sala-pin').innerText = dados.pin;
                document.getElementById('sala-pin').style.color = "#ffffff"; // Fica branco quando dá certo
                
                // Gera o QR Code com o link direto para o jogo
                const qrContainer = document.getElementById('qrcode');
                qrContainer.innerHTML = ''; // Limpa a imagem anterior caso o PIN atualize
                const joinUrl = `${window.location.origin}/?pin=${dados.pin}`;
                
                new QRCode(qrContainer, {
                    text: joinUrl,
                    width: 450,
                    height: 450,
                    colorDark : "#000000",
                    colorLight : "#ffffff"
                });
            }
        });
        
        // Atualiza a tela de Cronômetro
        socket.on('atualizar-timer', (tempo) => {
            const timerEl = document.getElementById('timer-display');
            if (tempo > 0) {
                timerEl.style.display = 'flex';
                timerEl.innerText = tempo;
                if (tempo <= 5) timerEl.classList.add('timer-warning');
                else timerEl.classList.remove('timer-warning');
            } else {
                timerEl.innerText = "0";
            }
        });

        socket.on('tempo-esgotado', () => {
            document.getElementById('timer-display').innerText = "0";
            document.getElementById('dica-admin').innerText = "⏰ TEMPO ESGOTADO! Clique em Revelar Resposta.";
        });

        socket.on('atualizar-pergunta', (dados) => {
            document.getElementById('pergunta').innerText = dados.pergunta;
            if (dados.opcoes) {
                // Só exibe a grade de respostas se a opção A não for o traço do Lobby "-"
                if (dados.opcoes.A !== "-") {
                    document.getElementById('pergunta').style.display = 'block'; // Mostra a pergunta
                    document.getElementById('lobby-text').style.display = 'none'; // Esconde o "Aguardando..."
                    document.getElementById('opcoes-grid').style.display = 'grid';
                    document.getElementById('controle-inicio').style.display = 'none';
                    document.getElementById('controle-jogo').style.display = 'flex';
                } else {
                    document.getElementById('pergunta').style.display = 'none'; // Esconde a pergunta no Lobby
                    document.getElementById('lobby-text').style.display = 'block'; // Mostra o "Aguardando..."
                    document.getElementById('opcoes-grid').style.display = 'none';
                }
                document.getElementById('texto-A').innerText = dados.opcoes.A;
                document.getElementById('texto-B').innerText = dados.opcoes.B;
                document.getElementById('texto-C').innerText = dados.opcoes.C;
                document.getElementById('texto-D').innerText = dados.opcoes.D;
            }
            atualizarTelaVotos(dados.votos);
            
            // Remove os efeitos de certo/errado ao pular de pergunta
            document.querySelectorAll('.k-card').forEach(card => {
                card.classList.remove('correct-answer', 'wrong-answer');
            });
        });

        // Atualiza a lista lateral com quem está conectado e exibe a pontuação
        socket.on('atualizar-usuarios', (usuarios) => {
            const userList = document.getElementById('user-list');
            document.getElementById('user-count').innerText = usuarios.length;
            userList.innerHTML = '';
            
            // Ordena os usuários pela pontuação (do maior para o menor)
            usuarios.sort((a, b) => b.pontos - a.pontos);
            
            usuarios.forEach((user, index) => {
                const coroa = (index === 0 && user.pontos > 0) ? '👑 ' : '';
                userList.innerHTML += `
                    <div class="user-list-item">
                        <img src="${user.avatar}" alt="${user.nome}">
                        <span>${coroa}${user.nome} <br><small>${user.pontos} pts</small></span>
                    </div>
                `;
            });
        });

        // Escuta quando um novo usuário entra e toca o som de notificação (Pop)
        socket.on('usuario-conectado', (usuario) => {
            const audioJoin = new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg');
            audioJoin.volume = 0.6; // Ajusta o volume para não assustar
            audioJoin.play().catch(err => console.log("Áudio bloqueado:", err));
            
            // Cria o Pop-up na tela do telão
            const container = document.getElementById('admin-toast-container');
            const toast = document.createElement('div');
            toast.className = 'admin-toast';
            toast.innerHTML = `<img src="${usuario.avatar}" alt="${usuario.nome}"> <span>${usuario.nome} entrou!</span>`;
            container.appendChild(toast);
            
            // Deixa por 1 segundo, aplica o fade out e remove
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 400); // Remove o elemento do HTML após o fade
            }, 1000);
        });

        socket.on('atualizar-votos', (votos) => {
            atualizarTelaVotos(votos);
        });

        function atualizarTelaVotos(votos) {
            document.getElementById('votosA').innerText = votos.A;
            document.getElementById('votosB').innerText = votos.B;
            document.getElementById('votosC').innerText = votos.C;
            document.getElementById('votosD').innerText = votos.D;
        }

        let indicePergunta = 0;
        let respostaCorretaAtual = "";
        let quizPld = [];

        // Carrega as perguntas do arquivo JSON
        fetch('questions.json')
            .then(response => response.json())
            .then(data => {
                quizPld = data;
            })
            .catch(error => console.error("Erro ao carregar as perguntas:", error));

        // Envia o novo limite em tempo real caso o apresentador edite a caixa de número antes de iniciar
        function atualizarLimite(valor) {
            const novoLimite = parseInt(valor);
            if (novoLimite > 0) socket.emit('atualizar-limite', novoLimite);
        }

        // Avança da tela de QR Code para a tela de Lobby e revela o PIN
        function irParaLobby() {
            document.getElementById('qr-container').style.display = 'none';
            document.getElementById('question-container').style.display = 'block';
            document.getElementById('admin-sidebar').style.display = 'block';
            document.getElementById('admin-body').style.paddingRight = '250px'; // Abre espaço para a barra lateral
        }

        // Disparado quando o admin decide fechar a sala para novas entradas e começar
        function iniciarQuiz() {
            const limite = document.getElementById('limite-participantes').value;
            if (confirm(`Deseja trancar a sala com o limite de ${limite} jogadores e iniciar o jogo?`)) {
                socket.emit('iniciar-jogo', { limite: parseInt(limite) || 60 });
                document.getElementById('controle-inicio').style.display = 'none'; // Some botões de lobby
                document.getElementById('controle-jogo').style.display = 'flex'; // Aparece botões do jogo
                mudarPergunta(); // Envia a PRIMEIRA pergunta automaticamente!
            }
        }

        function mudarPergunta() {
            if (indicePergunta < quizPld.length) {
                const q = quizPld[indicePergunta];
                socket.emit('proxima-pergunta', {
                    pergunta: q.pergunta,
                    opcoes: q.opcoes
                });
                
                respostaCorretaAtual = q.correta; // Salva a resposta correta na memória
                document.getElementById('dica-admin').innerText = ""; // Deixa a tela limpa sem spoiler!
                indicePergunta++;
            } else {
                alert("Todas as perguntas acabaram! Revele a última resposta e clique em Pódio.");
                document.getElementById('dica-admin').innerText = "Fim do Quiz!";
            }
        }

        // Envia a avaliação para o servidor
        function avaliarResposta() {
            if (!respostaCorretaAtual) return;
            socket.emit('avaliar-pergunta', respostaCorretaAtual);
            document.getElementById('dica-admin').innerText = ""; // Limpa a mensagem de tempo esgotado
        }
        
        function encerrarJogo() {
            if(confirm("Deseja finalizar o quiz definitivamente e exibir o Pódio Final?")) socket.emit('encerrar-jogo');
        }

        function reiniciarJogo() {
            if(confirm("Tem certeza que deseja apagar todos os jogadores, zerar os pontos e gerar um novo PIN?")) {
                socket.emit('reiniciar-jogo');
            }
        }

        // Escuta o evento para animar o telão
        socket.on('mostrar-resposta-correta', (opcaoCorreta) => {
            // Toca o efeito sonoro de revelação da resposta
            const audioReveal = new Audio('https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg');
            audioReveal.volume = 0.7;
            audioReveal.play().catch(err => console.log("Áudio bloqueado:", err));

            const opcoes = ['A', 'B', 'C', 'D'];
            opcoes.forEach(opcao => {
                const card = document.getElementById('card-' + opcao);
                if (card) {
                    if (opcao === opcaoCorreta) {
                        card.classList.add('correct-answer');
                    } else {
                        card.classList.add('wrong-answer');
                    }
                }
            });
        });

        // Exibe o Pódio Animado no Telão
        socket.on('exibir-podio', (rankingCompleto) => {
            document.getElementById('question-container').style.display = 'none'; // Esconde as perguntas
            document.getElementById('admin-sidebar').style.display = 'none'; // Esconde a barra lateral
            document.getElementById('admin-body').style.paddingRight = '0'; // Centraliza o pódio
            document.getElementById('podium-container').style.display = 'block'; // Mostra o pódio
            
            // Toca os tambores de suspense
            const audioTambores = new Audio('https://www.myinstants.com/media/sounds/drum-roll-sound-effect.mp3');
            audioTambores.play().catch(err => console.log(err));

            setTimeout(() => {
                const audioAplausos = new Audio('https://actions.google.com/sounds/v1/crowds/light_applause.ogg');
                audioAplausos.play().catch(err => console.log(err));
            }, 2500); // Aplausos só entram quando o 1º lugar for revelado!

            setTimeout(() => {
                const duracaoConfete = 5 * 1000;
                const fimAnimacao = Date.now() + duracaoConfete;
                const coresPodio = ['#FFD700', '#C0C0C0', '#CD7F32'];

                (function dispararConfetes() {
                    confetti({ particleCount: 8, angle: 60, spread: 55, origin: { x: 0 }, colors: coresPodio, zIndex: 1000 });
                    confetti({ particleCount: 8, angle: 120, spread: 55, origin: { x: 1 }, colors: coresPodio, zIndex: 1000 });
                    if (Date.now() < fimAnimacao) requestAnimationFrame(dispararConfetes);
                }());
            }, 2500); // Aguarda a animação da barra do 1º lugar subir para estourar

            const podiumPlaces = document.getElementById('podium-places');
            podiumPlaces.innerHTML = '';
            const rankingPodio = rankingCompleto.slice(0, 3);
            const visualOrder = [1, 0, 2];
            
            visualOrder.forEach(idx => {
                if (rankingPodio[idx]) {
                    const user = rankingPodio[idx];
                    const positionClass = idx === 0 ? 'first' : (idx === 1 ? 'second' : 'third');
                    const crownHtml = idx === 0 ? '<i class="fa-solid fa-crown crown-icon"></i>' : '';
                    podiumPlaces.innerHTML += `
                        <div class="podium-place ${positionClass}">
                            ${crownHtml}
                            <img src="${user.avatar}" alt="${user.nome}">
                            <div class="podium-bar"><span>${idx + 1}º</span><span style="font-size:0.7rem">${user.pontos} pts</span></div>
                            <span class="podium-name" style="color: white; font-size: 1.2rem;">${user.nome}</span>
                        </div>
                    `;
                }
            });
        });

        // Quando o servidor reinicia o jogo, recarrega a página do Admin para atualizar o PIN na tela
        socket.on('jogo-reiniciado', () => {
            location.reload();
        });

        // --- SISTEMA DE GERENCIAMENTO DE PERGUNTAS ---
        function abrirGerenciadorPerguntas() {
            document.getElementById('modal-perguntas').style.display = 'block';
            renderizarListaPerguntas();
        }

        function fecharGerenciador() {
            document.getElementById('modal-perguntas').style.display = 'none';
        }

        function renderizarListaPerguntas() {
            const lista = document.getElementById('lista-perguntas');
            lista.innerHTML = '';
            quizPld.forEach((q, index) => {
                lista.innerHTML += `
                    <div class="pergunta-item">
                        <div style="flex-grow: 1;">
                            <strong>${index + 1}. ${q.pergunta.replace(/^\d+\.\s*/, '')}</strong><br>
                            <small>A) ${q.opcoes.A} | B) ${q.opcoes.B} | C) ${q.opcoes.C} | D) ${q.opcoes.D} <strong style="color:#4CAF50;">(Correta: ${q.correta})</strong></small>
                        </div>
                        <button class="btn-remover" onclick="removerPergunta(${index})" title="Excluir"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
        }

        function adicionarPergunta() {
            const texto = document.getElementById('nova-pergunta-texto').value;
            const a = document.getElementById('nova-opcao-a').value;
            const b = document.getElementById('nova-opcao-b').value;
            const c = document.getElementById('nova-opcao-c').value;
            const d = document.getElementById('nova-opcao-d').value;
            const correta = document.getElementById('nova-correta').value;

            if (!texto || !a || !b || !c || !d) return alert('Preencha todos os campos da pergunta!');

            quizPld.push({ pergunta: `${quizPld.length + 1}. ${texto}`, opcoes: { A: a, B: b, C: c, D: d }, correta: correta });

            document.getElementById('nova-pergunta-texto').value = '';
            document.getElementById('nova-opcao-a').value = '';
            document.getElementById('nova-opcao-b').value = '';
            document.getElementById('nova-opcao-c').value = '';
            document.getElementById('nova-opcao-d').value = '';
            renderizarListaPerguntas();
        }

        function removerPergunta(index) {
            if (confirm("Tem certeza que deseja remover esta pergunta?")) {
                quizPld.splice(index, 1);
                quizPld = quizPld.map((q, i) => { q.pergunta = `${i + 1}. ${q.pergunta.replace(/^\d+\.\s*/, '')}`; return q; });
                renderizarListaPerguntas();
            }
        }

        function salvarPerguntasNoServidor() {
            socket.emit('salvar-perguntas', quizPld);
        }

        socket.on('perguntas-salvas', () => { alert('Perguntas salvas com sucesso!'); fecharGerenciador(); });
        socket.on('perguntas-erro', (err) => { alert('Erro ao salvar perguntas: ' + err); });
    </script>
</body>
